<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dawned Motivation Browser</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Quote Box -->
    <div class="quote-box" id="quoteBox">
        Loading quote...
    </div>

    <!-- Search Bar -->
    <div class="search-container">
        <form id="searchForm">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Search Google..."
            >
            <button type="submit" id="searchButton">Search</button>
        </form>
    </div>

    <!-- Footer (Exact Dawned OS Footer) -->
    <footer id="footer">
        <div id="footer-left">
            <span>Dawned OS</span>
        </div>

        <div id="footer-center">
            <span id="footer-clock"></span>
        </div>

        <div id="footer-right">
            <span>Made by Aamir</span>
        </div>
    </footer>

    <script src="main.js" defer></script>
</body>
</html>
